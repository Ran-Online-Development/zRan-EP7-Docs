<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>zRan EP7 Docs</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="description" content="Public player documentation for zRan EP7.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #2f6f9f;
    }

    .app-name-link {
      font-weight: 700;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3 {
      letter-spacing: 0;
    }

    .markdown-section table {
      display: table;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="app">Loading zRan EP7 documentation...</div>
  <script>
    window.$docsify = {
      name: 'zRan EP7 Docs',
      repo: 'Ran-Online-Development/zRan-EP7-Docs',
      homepage: 'README.md',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        paths: 'auto',
        placeholder: 'Search',
        noData: 'No results',
        depth: 3
      }
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
